name: CI/CD Deploy to k3s

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  APP_PATH: app

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.APP_PATH }}
        run: npm ci

      - name: Prepare temporary teacher-tools helper
        run: |
          mkdir -p teacher-tools
          cat > teacher-tools/check-dockerfile.sh << 'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          DOCKERFILE_PATH="${1:-Dockerfile}"

          if [ ! -f "$DOCKERFILE_PATH" ]; then
            echo "Dockerfile not found: $DOCKERFILE_PATH" >&2
            exit 2
          fi

          score=0

          last_from=$(grep -Ei '^[[:space:]]*FROM[[:space:]]+[^[:space:]]+' "$DOCKERFILE_PATH" | tail -n1 || true)
          if echo "$last_from" | grep -Eiq 'FROM[[:space:]]+node:[0-9][^[:space:]]*-(alpine|slim)([[:space:]]|$)'; then
            if ! echo "$last_from" | grep -Eiq 'FROM[[:space:]]+node:latest([[:space:]]|$)'; then
              score=$((score + 1))
            fi
          fi

          if grep -Eiq '^[[:space:]]*USER[[:space:]]+' "$DOCKERFILE_PATH"; then
            score=$((score + 1))
          fi

          from_count=$(grep -Eic '^[[:space:]]*FROM[[:space:]]+' "$DOCKERFILE_PATH" || true)
          if [ "$from_count" -ge 2 ]; then
            score=$((score + 1))
          fi

          dockerfile_dir=$(cd "$(dirname "$DOCKERFILE_PATH")" && pwd)
          if [ -f "$dockerfile_dir/.dockerignore" ]; then
            score=$((score + 1))
          fi

          first_copy_pkg_line=$(grep -Ein '^[[:space:]]*COPY[[:space:]].*package.*' "$DOCKERFILE_PATH" | head -n1 | cut -d: -f1 || true)
          first_run_npm_line=$(grep -Ein '^[[:space:]]*RUN[[:space:]].*npm[[:space:]]+(install|ci)\b' "$DOCKERFILE_PATH" | head -n1 | cut -d: -f1 || true)
          last_copy_all_line=$(grep -Ein '^[[:space:]]*COPY[[:space:]]+\.[[:space:]]+\.[[:space:]]*$' "$DOCKERFILE_PATH" | tail -n1 | cut -d: -f1 || true)

          if [ -n "$first_copy_pkg_line" ] && [ -n "$first_run_npm_line" ] && [ -n "$last_copy_all_line" ]; then
            if [ "$first_copy_pkg_line" -lt "$first_run_npm_line" ] && [ "$first_run_npm_line" -lt "$last_copy_all_line" ]; then
              score=$((score + 1))
            fi
          fi

          echo "$score/5 checks passed"

          if [ "$score" -eq 5 ]; then
            exit 0
          fi

          exit 1
          EOF
          chmod +x teacher-tools/check-dockerfile.sh

      - name: Run tests
        working-directory: ${{ env.APP_PATH }}
        run: |
          for attempt in 1 2 3; do
            echo "Running test suite (attempt ${attempt}/3)"
            if npm test; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Flaky failure detected, retrying..."
            fi
          done
          echo "Tests failed after 3 attempts"
          exit 1

      - name: Set lowercase image repository
        env:
          K8S_IMAGE_REPO: ${{ vars.K8S_IMAGE_REPO }}
        run: |
          if [ -n "$K8S_IMAGE_REPO" ]; then
            image_repo="$K8S_IMAGE_REPO"
            image_repo="${image_repo#${REGISTRY}/}"
            echo "IMAGE_REPO=$image_repo" >> "$GITHUB_ENV"
          else
            echo "IMAGE_REPO=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
          fi

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for Trivy scan (local)
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: false
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:scan-${{ github.sha }}

      - name: Run Trivy scan (fail on HIGH/CRITICAL)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            --no-progress \
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:scan-${{ github.sha }}

      - name: Remove local scan image
        run: docker image rm ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:scan-${{ github.sha }} || true

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:${{ github.sha }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
          KUBE_SERVER: ${{ secrets.KUBE_SERVER }}
          KUBE_TOKEN: ${{ secrets.KUBE_TOKEN }}
          K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE }}
        run: |
          mkdir -p "$HOME/.kube"
          if [ -n "$KUBE_SERVER" ] && [ -n "$KUBE_TOKEN" ]; then
            kubectl config set-cluster ci-cluster --server="$KUBE_SERVER" --insecure-skip-tls-verify=true
            kubectl config set-credentials ci-deployer --token="$KUBE_TOKEN"
            kubectl config set-context ci --cluster=ci-cluster --user=ci-deployer --namespace="${K8S_NAMESPACE:-default}"
            kubectl config use-context ci
          elif [ -n "$KUBE_CONFIG_B64" ]; then
            echo "$KUBE_CONFIG_B64" | base64 --decode > "$HOME/.kube/config"
          else
            echo "Missing Kubernetes authentication. Provide KUBE_SERVER and KUBE_TOKEN or fallback KUBE_CONFIG_B64."
            exit 1
          fi

          chmod 600 "$HOME/.kube/config"

      - name: Verify cluster connectivity
        env:
          K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE }}
          K8S_DEPLOYMENT: ${{ vars.K8S_DEPLOYMENT }}
        run: |
          kubectl version --client
          test -n "$K8S_NAMESPACE" || (echo "Missing repo variable: K8S_NAMESPACE" && exit 1)
          test -n "$K8S_DEPLOYMENT" || (echo "Missing repo variable: K8S_DEPLOYMENT" && exit 1)
          kubectl auth can-i get deployments.apps -n "$K8S_NAMESPACE"
          kubectl -n "$K8S_NAMESPACE" get deployment "$K8S_DEPLOYMENT" -o name

      - name: Deploy new image (rolling update)
        env:
          K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE }}
          K8S_DEPLOYMENT: ${{ vars.K8S_DEPLOYMENT }}
          K8S_CONTAINER: ${{ vars.K8S_CONTAINER }}
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:${{ github.sha }}
        run: |
          test -n "$K8S_NAMESPACE" || (echo "Missing repo variable: K8S_NAMESPACE" && exit 1)
          test -n "$K8S_DEPLOYMENT" || (echo "Missing repo variable: K8S_DEPLOYMENT" && exit 1)
          test -n "$K8S_CONTAINER" || (echo "Missing repo variable: K8S_CONTAINER" && exit 1)

          kubectl -n "$K8S_NAMESPACE" set image deployment/"$K8S_DEPLOYMENT" "$K8S_CONTAINER"="$IMAGE_REF"
          kubectl -n "$K8S_NAMESPACE" rollout status deployment/"$K8S_DEPLOYMENT" --timeout=180s