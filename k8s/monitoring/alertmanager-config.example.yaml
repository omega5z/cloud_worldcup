# Example Alertmanager config — apply AFTER customizing receivers.
# Do NOT commit real webhook URLs or SMTP passwords.
#
# 1. Copy and edit receivers (ntfy, email, Slack, etc.)
# 2. kubectl apply -f k8s/monitoring/alertmanager-config.example.yaml
# 3. Or merge into helm-values.yaml under alertmanager.config (see guide)
#
# kube-prometheus-stack secret name: alertmanager-monitoring-kube-prometheus-alertmanager
# Generated by Helm — prefer helm upgrade with values for persistence across upgrades.

apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-monitoring-kube-prometheus-alertmanager
  namespace: monitoring
  labels:
    app: kube-prometheus-stack-alertmanager
type: Opaque
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: default
      group_by: ['alertname', 'namespace', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      routes:
        - match:
            severity: critical
          receiver: critical
          repeat_interval: 1h
        - match:
            team: worldcup
          receiver: worldcup

    receivers:
      - name: default
        # ntfy example (homelab-friendly, no SMTP)
        webhook_configs:
          - url: 'https://ntfy.example.com/worldcup-alerts'
            send_resolved: true
            http_config:
              basic_auth:
                username: ntfy-user
                password: CHANGE_ME

      - name: critical
        webhook_configs:
          - url: 'https://ntfy.example.com/worldcup-critical'
            send_resolved: true

      - name: worldcup
        webhook_configs:
          - url: 'https://ntfy.example.com/worldcup-k8s'
            send_resolved: true

    inhibit_rules:
      - source_match:
          severity: critical
        target_match:
          severity: warning
        equal: ['alertname', 'namespace']
