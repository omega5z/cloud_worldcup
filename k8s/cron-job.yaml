apiVersion: batch/v1
kind: CronJob
metadata:
  name: worldcup-standings-cronjob
  namespace: worldcup
spec:
  schedule: "*/30 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app: standings-job
        spec:
          restartPolicy: OnFailure
          imagePullSecrets:
            - name: ghcr-credentials
          containers:
            - name: standings-worker
              image: ghcr.io/omega5z/cloud_worldcup:latest
              imagePullPolicy: Always
              command: ["node", "jobs/jobs-standind.js"]
              envFrom:
                - configMapRef:
                    name: app-config
              env:
                - name: DB_USER
                  valueFrom:
                    secretKeyRef:
                      name: db-credentials
                      key: POSTGRES_USER
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: db-credentials
                      key: POSTGRES_PASSWORD
                - name: DB_NAME
                  valueFrom:
                    secretKeyRef:
                      name: db-credentials
                      key: POSTGRES_DB
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
