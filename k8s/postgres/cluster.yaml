apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  namespace: worldcup
spec:
  instances: 3

  imageName: ghcr.io/cloudnative-pg/postgresql:15

  postgresql:
    parameters:
      max_connections: "100"

  bootstrap:
    initdb:
      database: worldcup2026
      owner: postgres
      secret:
        name: postgres-cnpg-auth
      postInitApplicationSQLRefs:
        configMapRefs:
          - name: postgres-init
            key: init.sql

  storage:
    size: 5Gi
    storageClass: local-path

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 768Mi

  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
    podAntiAffinityType: required
