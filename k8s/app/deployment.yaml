apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: worldcup
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worldcup-app
  template:
    metadata:
      labels:
        app: worldcup-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      nodeSelector:
        node-role/workload: app
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: worldcup-app
                topologyKey: kubernetes.io/hostname
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: app
          image: ghcr.io/omega5z/cloud_worldcup:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_DB
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          startupProbe:
            httpGet:
              path: /api/health
              port: 3000
            periodSeconds: 2
            failureThreshold: 15
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            periodSeconds: 3
            timeoutSeconds: 2
            failureThreshold: 2
          readinessProbe:
            httpGet:
              path: /api/health/db
              port: 3000
            initialDelaySeconds: 2
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 2
